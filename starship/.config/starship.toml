format = """\
$username\
$directory\
$git_branch\
$git_status \
$cmd_duration\
$character"""

palette = "one_dark"

[username]
show_always = false
style_user = "bold white"
format = "[$user]($style) "

[directory]
style = "bold cyan"
truncation_length = 2
truncate_to_repo = true
format = "[$path]($style) "

[git_branch]
symbol = ""
style = "bold purple"
format = "[\\[$branch\\]]($style) "

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style) "
conflicted = "= "
ahead = "↑ "
behind = "↓ "
diverged = "↕ "
untracked = "? "
stashed = "$ "
modified = "! "
staged = "+ "
renamed = "» "
deleted = "✘ "

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vicmd_symbol = "[❮](yellow)"

[package]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[python]
disabled = true

[palettes.one_dark]
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
purple = "#c678dd"
cyan = "#56b6c2"
white = "#abb2bf"
orange = "#d19a66"

[palettes.rose_pine_moon]
red = "#eb6f92"
green = "#3e8fb0"
yellow = "#f6c177"
blue = "#9ccfd8"
purple = "#c4a7e7"
cyan = "#ea9a97"
white = "#e0def4"
orange = "#f6c177"
