general {
    ignore_empty_input = true
    no_fade_in = false
}

background {
    monitor =
    color = rgb(1e1e2e)
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
}

input-field {
    monitor =
    size = 300, 50
    position = 0, -80
    halign = center
    valign = center

    inner_color = rgb(313244)
    outer_color = rgb(cba6f7)
    outline_thickness = 2

    font_color = rgb(cd d6 f4)
    placeholder_text = <i>Password...</i>
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <i>$FAIL</i>

    rounding = 10
    shadow_passes = 2
    fade_on_empty = false
}
