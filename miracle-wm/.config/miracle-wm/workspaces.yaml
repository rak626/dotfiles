# ~/.config/miracle-wm/workspaces.yaml
# =====================================================================
#                     WORKSPACE VIRTUAL DESKTOPS
# =====================================================================
# Maps workspaces 1-9 with custom titles and modern NerdFont glyphs.
# Fully integrated to map beautifully into Waybar status bar layouts.

workspaces:
  - number: 1
    name: "1"
  - number: 2
    name: "2"
  - number: 3
    name: "3"
  - number: 4
    name: "4"
  - number: 5
    name: "5"
  - number: 6
    name: "6"
  - number: 7
    name: "7"
  - number: 8
    name: "8"
  - number: 9
    name: "9"
